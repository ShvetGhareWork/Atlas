name: Atlas Platform CI

# When should this pipeline run?
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # We use Ubuntu because it's standard for production servers
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your code onto the GitHub runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install the correct version of Java
    # IMPORTANT: Ensure 'java-version' matches your local setup (17, 21, or 25)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin' # A reliable, open-source JDK
        cache: maven            # Speeds up future builds by caching dependencies

    # Step 3: The actual build command (The Maven Reactor)
    # '-B' means 'Batch mode' (less messy logs in the terminal)
    - name: Build and Test with Maven
      working-directory: atlas-platform
      run: mvn -B clean verify

    # Step 4: (Optional but highly recommended) Upload Test Results
    # If a test fails, this lets you download the reports to see why.
    - name: Upload Test Reports
      if: always() # Run this even if the build fails
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/target/surefire-reports/'
